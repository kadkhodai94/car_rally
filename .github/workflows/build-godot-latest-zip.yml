name: Build Godot Latest ZIP Docker CI

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android APK"
        required: true
        default: true
        type: boolean
      build_web:
        description: "Build Web ZIP"
        required: true
        default: true
        type: boolean
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: godot-docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "jade-bipayan"
  ANDROID_PRESET: "Android"
  WEB_PRESET: "Web"

jobs:
  build:
    name: Build Godot APK/Web with Docker CI
    runs-on: ubuntu-22.04
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Resolve latest Godot project ZIP
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$GITHUB_WORKSPACE"
          WORK="$ROOT/_godot_ci"
          EXTRACT_DIR="$WORK/extracted"

          rm -rf "$WORK"
          mkdir -p "$EXTRACT_DIR"

          if [ -f "$ROOT/project.godot" ]; then
            echo "project_dir=$ROOT" >> "$GITHUB_OUTPUT"
            echo "zip_file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ZIP_FILE="$(python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path('.').resolve()
          zips = [
              p for p in root.glob('*.zip')
              if p.is_file()
              and not p.name.startswith('_')
              and 'artifact' not in p.name.lower()
              and 'build' not in p.name.lower()
              and 'output' not in p.name.lower()
          ]

          if not zips:
              print('ERROR: No ZIP file found in repository root.', file=sys.stderr)
              sys.exit(1)

          def version_key(path: Path):
              name = path.stem.lower()
              matches = re.findall(r'(?:v)?(\d+(?:[._-]\d+){0,10})', name)
              nums = []
              if matches:
                  nums = [int(x) for x in re.split(r'[._-]', matches[-1]) if x.isdigit()]
              nums = nums + [0] * (11 - len(nums))
              return (tuple(nums[:11]), path.stat().st_mtime, path.name.lower())

          print(sorted(zips, key=version_key)[-1])
          PY
          )"

          echo "Selected ZIP: $ZIP_FILE"
          unzip -q -o "$ZIP_FILE" -d "$EXTRACT_DIR"

          PROJECT_GODOT="$(find "$EXTRACT_DIR" -type f -name project.godot | sort | head -n 1 || true)"

          if [ -z "$PROJECT_GODOT" ]; then
            echo "ERROR: project.godot not found inside selected ZIP."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_GODOT")"

          if [ ! -f "$PROJECT_DIR/export_presets.cfg" ]; then
            echo "ERROR: export_presets.cfg not found beside project.godot."
            exit 1
          fi

          echo "Detected project: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Setup Godot CI paths
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.local/share/godot/export_templates"
          mkdir -p "$HOME/.config"

          if [ -d "/root/.config/godot" ]; then
            rm -rf "$HOME/.config/godot"
            cp -R "/root/.config/godot" "$HOME/.config/godot"
          else
            mkdir -p "$HOME/.config/godot"
          fi

          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            rm -rf "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
            cp -R "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          elif [ -d "/root/.local/share/godot/templates/${GODOT_VERSION}.stable" ]; then
            rm -rf "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
            cp -R "/root/.local/share/godot/templates/${GODOT_VERSION}.stable" "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          fi

          JAVA_PATH="/usr/lib/jvm/java-17-openjdk-amd64"
          if [ ! -d "$JAVA_PATH" ]; then
            JAVA_PATH="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          fi

          ANDROID_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$ANDROID_PATH" ]; then
            for candidate in /opt/android-sdk /root/android-sdk /usr/lib/android-sdk /android-sdk; do
              if [ -d "$candidate" ]; then
                ANDROID_PATH="$candidate"
                break
              fi
            done
          fi

          if [ -z "$ANDROID_PATH" ]; then
            echo "ERROR: Android SDK path was not found inside Docker image."
            find / -maxdepth 3 -type d -iname '*android*' 2>/dev/null | head -n 80 || true
            exit 1
          fi

          export ANDROID_HOME="$ANDROID_PATH"
          export ANDROID_SDK_ROOT="$ANDROID_PATH"
          echo "ANDROID_HOME=$ANDROID_HOME" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$JAVA_PATH" >> "$GITHUB_ENV"

          SETTINGS_FILE="$HOME/.config/godot/editor_settings-4.3.tres"
          touch "$SETTINGS_FILE"
          grep -q '^export/android/android_sdk_path' "$SETTINGS_FILE" || echo "export/android/android_sdk_path = \"$ANDROID_HOME\"" >> "$SETTINGS_FILE"
          grep -q '^export/android/java_sdk_path' "$SETTINGS_FILE" || echo "export/android/java_sdk_path = \"$JAVA_PATH\"" >> "$SETTINGS_FILE"

          echo "Godot version:"
          godot --version
          echo "Java: $JAVA_PATH"
          echo "Android SDK: $ANDROID_HOME"
          echo "Export templates:"
          ls -lah "$HOME/.local/share/godot/export_templates" || true
          ls -lah "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable" || true

      - name: Create debug keystore
        shell: bash
        run: |
          set -euo pipefail

          KEYSTORE_DIR="$GITHUB_WORKSPACE/_godot_keystore"
          KEYSTORE_PATH="$KEYSTORE_DIR/debug.keystore"

          rm -rf "$KEYSTORE_DIR"
          mkdir -p "$KEYSTORE_DIR"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          echo "DEBUG_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

          ls -lah "$KEYSTORE_PATH"

      - name: Warm up project import
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"

          godot \
            --headless \
            --path "$PROJECT_DIR" \
            --editor \
            --quit \
            --verbose 2>&1 | tee "$GITHUB_WORKSPACE/godot-warmup.log" || true

      - name: Patch Android credentials after warm up
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          PRESET_FILE="$PROJECT_DIR/export_presets.cfg"
          CREDENTIALS_DIR="$PROJECT_DIR/.godot"
          CREDENTIALS_FILE="$CREDENTIALS_DIR/export_credentials.cfg"

          mkdir -p "$CREDENTIALS_DIR"

          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          preset_file = Path(os.environ['PRESET_FILE'])
          text = preset_file.read_text(encoding='utf-8')
          debug_keystore = os.environ['DEBUG_KEYSTORE']

          def set_key(text: str, key: str, value: str) -> str:
              if re.search(rf'^{re.escape(key)}=', text, flags=re.M):
                  return re.sub(rf'^{re.escape(key)}=.*$', f'{key}={value}', text, flags=re.M)
              marker = '[preset.0.options]'
              if marker not in text:
                  raise SystemExit('ERROR: [preset.0.options] not found in export_presets.cfg')
              pos = text.index(marker) + len(marker)
              return text[:pos] + f'\n{key}={value}' + text[pos:]

          text = set_key(text, 'gradle_build/use_gradle_build', 'false')
          text = set_key(text, 'gradle_build/min_sdk', '""')
          text = set_key(text, 'gradle_build/target_sdk', '""')
          text = set_key(text, 'package/signed', 'true')
          text = set_key(text, 'package/show_as_launcher_app', 'true')
          text = set_key(text, 'keystore/debug', f'"{debug_keystore}"')
          text = set_key(text, 'keystore/debug_user', '"androiddebugkey"')
          text = set_key(text, 'keystore/debug_password', '"android"')
          text = set_key(text, 'keystore/release', '""')
          text = set_key(text, 'keystore/release_user', '""')
          text = set_key(text, 'keystore/release_password', '""')
          preset_file.write_text(text, encoding='utf-8')
          PY

          cat > "$CREDENTIALS_FILE" <<CREDENTIALS
          [preset.0]

          keystore/debug="$DEBUG_KEYSTORE"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          CREDENTIALS

          echo "Final Android preset signing lines:"
          grep -nE 'name=|platform=|gradle_build|package/unique_name|package/name|package/signed|package/show_as_launcher_app|keystore/debug|keystore/release|architectures' "$PRESET_FILE" || true
          echo "Export credentials file:"
          cat "$CREDENTIALS_FILE"
        env:
          PRESET_FILE: ${{ steps.resolve.outputs.project_dir }}/export_presets.cfg

      - name: Build Android APK
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/android"
          APK_PATH="$OUT_DIR/${EXPORT_NAME}-${GITHUB_RUN_NUMBER}.apk"
          LOG_PATH="$GITHUB_WORKSPACE/godot-android-export.log"

          mkdir -p "$OUT_DIR"

          godot \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-debug "$ANDROID_PRESET" \
            "$APK_PATH" 2>&1 | tee "$LOG_PATH"

          test -f "$APK_PATH"
          ls -lah "$OUT_DIR"

      - name: Build Web ZIP
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/web"
          ZIP_OUT="$GITHUB_WORKSPACE/build/${EXPORT_NAME}-web-${GITHUB_RUN_NUMBER}.zip"
          LOG_PATH="$GITHUB_WORKSPACE/godot-web-export.log"

          mkdir -p "$OUT_DIR"

          godot \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-release "$WEB_PRESET" \
            "$OUT_DIR/index.html" 2>&1 | tee "$LOG_PATH"

          cd "$GITHUB_WORKSPACE/build"
          zip -qr "$ZIP_OUT" web
          test -f "$ZIP_OUT"

      - name: Upload Android APK artifact
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-android-apk
          path: build/android/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Web artifact
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-web
          path: build/*web*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Godot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-godot-logs
          path: |
            godot-warmup.log
            godot-android-export.log
            godot-web-export.log
          if-no-files-found: warn
          retention-days: 7
