name: Build Godot Latest ZIP Docker CI

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android APK"
        required: true
        default: true
        type: boolean
      build_web:
        description: "Build Web"
        required: true
        default: true
        type: boolean

  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: godot-docker-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3"
  EXPORT_NAME: "jade-bipayan"
  ANDROID_PRESET: "Android"
  WEB_PRESET: "Web"

jobs:
  build:
    name: Build Godot APK/Web with Docker CI
    runs-on: ubuntu-22.04

    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Resolve latest Godot project ZIP
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$GITHUB_WORKSPACE"
          WORK="$ROOT/_godot_ci"
          EXTRACT_DIR="$WORK/extracted"

          rm -rf "$WORK"
          mkdir -p "$EXTRACT_DIR"

          if [ -f "$ROOT/project.godot" ]; then
            echo "project_dir=$ROOT" >> "$GITHUB_OUTPUT"
            echo "zip_file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ZIP_FILE="$(
            find "$ROOT" -maxdepth 1 -type f -name "*.zip" \
              ! -name "_*" \
              ! -iname "*artifact*" \
              ! -iname "*build*" \
              ! -iname "*output*" \
              -printf "%f\n" \
              | sort -V \
              | tail -n 1
          )"

          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No ZIP file found in repository root."
            exit 1
          fi

          ZIP_PATH="$ROOT/$ZIP_FILE"

          echo "Selected ZIP: $ZIP_PATH"

          unzip -q -o "$ZIP_PATH" -d "$EXTRACT_DIR"

          PROJECT_GODOT="$(
            find "$EXTRACT_DIR" -type f -name project.godot \
              | sort \
              | head -n 1
          )"

          if [ -z "$PROJECT_GODOT" ]; then
            echo "ERROR: project.godot not found inside selected ZIP."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_GODOT")"

          echo "Detected project: $PROJECT_DIR"

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "zip_file=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Setup Godot CI paths
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.config/godot"
          mkdir -p "$HOME/.local/share/godot/export_templates"

          if [ -d "/root/.config/godot" ]; then
            rm -rf "$HOME/.config/godot"
            cp -R "/root/.config/godot" "$HOME/.config/godot"
          fi

          if [ -d "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" ]; then
            rm -rf "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
            cp -R "/root/.local/share/godot/export_templates/${GODOT_VERSION}.stable" "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          fi

          JAVA_PATH="/usr/lib/jvm/java-17-openjdk-amd64"

          if [ ! -d "$JAVA_PATH" ]; then
            JAVA_PATH="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
          fi

          ANDROID_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"

          if [ -z "$ANDROID_PATH" ]; then
            for candidate in /opt/android-sdk /root/android-sdk /usr/lib/android-sdk /android-sdk; do
              if [ -d "$candidate" ]; then
                ANDROID_PATH="$candidate"
                break
              fi
            done
          fi

          if [ -z "$ANDROID_PATH" ]; then
            echo "ERROR: Android SDK path was not found inside Docker image."
            find / -maxdepth 4 -type d -iname "*android*" 2>/dev/null | head -n 80 || true
            exit 1
          fi

          echo "ANDROID_HOME=$ANDROID_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$ANDROID_PATH" >> "$GITHUB_ENV"
          echo "JAVA_HOME=$JAVA_PATH" >> "$GITHUB_ENV"

          SETTINGS_FILE="$HOME/.config/godot/editor_settings-4.3.tres"

          cat > "$SETTINGS_FILE" <<SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_PATH"
          export/android/java_sdk_path = "$JAVA_PATH"
          SETTINGS

          echo "Godot version:"
          godot --version

          echo "Java path:"
          echo "$JAVA_PATH"

          echo "Android SDK:"
          echo "$ANDROID_PATH"

          echo "Editor settings:"
          cat "$SETTINGS_FILE"

          echo "Export templates:"
          ls -lah "$HOME/.local/share/godot/export_templates" || true
          ls -lah "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable" || true

      - name: Create debug keystore
        shell: bash
        run: |
          set -euo pipefail

          KEYSTORE_DIR="$GITHUB_WORKSPACE/_godot_keystore"
          KEYSTORE_PATH="$KEYSTORE_DIR/debug.keystore"

          rm -rf "$KEYSTORE_DIR"
          mkdir -p "$KEYSTORE_DIR"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          echo "DEBUG_KEYSTORE=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

          ls -lah "$KEYSTORE_PATH"

      - name: Normalize project files
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          PROJECT_FILE="$PROJECT_DIR/project.godot"

          if [ ! -f "$PROJECT_FILE" ]; then
            echo "ERROR: project.godot not found."
            exit 1
          fi

          if grep -q '^config/name=' "$PROJECT_FILE"; then
            sed -i 's#^config/name=.*#config/name="Jade Bipayan"#' "$PROJECT_FILE"
          fi

          if grep -q '^run/main_scene=' "$PROJECT_FILE"; then
            sed -i 's#^run/main_scene=.*#run/main_scene="res://scenes/Main.tscn"#' "$PROJECT_FILE"
          fi

          if grep -q '^renderer/rendering_method=' "$PROJECT_FILE"; then
            sed -i 's#^renderer/rendering_method=.*#renderer/rendering_method="gl_compatibility"#' "$PROJECT_FILE"
          fi

          if grep -q '^renderer/rendering_method.mobile=' "$PROJECT_FILE"; then
            sed -i 's#^renderer/rendering_method.mobile=.*#renderer/rendering_method.mobile="gl_compatibility"#' "$PROJECT_FILE"
          fi

          echo "Project file normalized."
          grep -nE 'config/name|run/main_scene|renderer/rendering_method' "$PROJECT_FILE" || true

      - name: Warm up project import
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"

          godot \
            --headless \
            --path "$PROJECT_DIR" \
            --editor \
            --quit \
            --verbose 2>&1 | tee "$GITHUB_WORKSPACE/godot-warmup.log" || true

      - name: Write clean export presets and credentials
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          PRESET_FILE="$PROJECT_DIR/export_presets.cfg"
          CREDENTIALS_DIR="$PROJECT_DIR/.godot"
          CREDENTIALS_FILE="$CREDENTIALS_DIR/export_credentials.cfg"

          mkdir -p "$CREDENTIALS_DIR"

          cat > "$PRESET_FILE" <<EOF
          [preset.0]

          name="Android"
          platform="Android"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/android/jade-bipayan.apk"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset.0.options]

          custom_template/debug=""
          custom_template/release=""
          gradle_build/use_gradle_build=false
          gradle_build/gradle_build_directory=""
          gradle_build/android_source_template=""
          gradle_build/compress_native_libraries=false
          gradle_build/export_format=0
          gradle_build/min_sdk=""
          gradle_build/target_sdk=""
          gradle_build/custom_theme_attributes={}
          architectures/armeabi-v7a=false
          architectures/arm64-v8a=true
          architectures/x86=false
          architectures/x86_64=false
          version/code=3
          version/name="1.2.1"
          package/unique_name="ir.gamino.jadebipayan"
          package/name="Jade Bipayan"
          package/signed=true
          package/app_category=2
          package/retain_data_on_uninstall=false
          package/exclude_from_recents=false
          package/show_in_android_tv=false
          package/show_in_app_library=true
          package/show_as_launcher_app=true
          keystore/debug="$DEBUG_KEYSTORE"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          launcher_icons/main_192x192=""
          launcher_icons/adaptive_foreground_432x432=""
          launcher_icons/adaptive_background_432x432=""
          launcher_icons/adaptive_monochrome_432x432=""
          graphics/opengl_debug=false
          xr_features/xr_mode=0
          screen/immersive_mode=true
          screen/support_small=true
          screen/support_normal=true
          screen/support_large=true
          screen/support_xlarge=true
          user_data_backup/allow=false
          command_line/extra_args=""
          apk_expansion/enable=false
          apk_expansion/SALT=""
          apk_expansion/public_key=""
          permissions/custom_permissions=PackedStringArray()
          permissions/access_network_state=false
          permissions/internet=false
          permissions/post_notifications=false
          permissions/vibrate=false
          permissions/wake_lock=false

          [preset.1]

          name="Web"
          platform="Web"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="build/web/index.html"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset.1.options]

          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=false
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          progressive_web_app/offline_page=""
          progressive_web_app/display=1
          progressive_web_app/orientation=0
          progressive_web_app/icon_144x144=""
          progressive_web_app/icon_180x180=""
          progressive_web_app/icon_512x512=""
          EOF

          sed -i 's/^          //' "$PRESET_FILE"

          cat > "$CREDENTIALS_FILE" <<EOF
          [preset.0]

          keystore/debug="$DEBUG_KEYSTORE"
          keystore/debug_user="androiddebugkey"
          keystore/debug_password="android"
          keystore/release=""
          keystore/release_user=""
          keystore/release_password=""
          EOF

          sed -i 's/^          //' "$CREDENTIALS_FILE"

          echo "Final export presets:"
          sed -n '1,130p' "$PRESET_FILE"

          echo "Export credentials:"
          cat "$CREDENTIALS_FILE"

      - name: Build Android APK
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/android"
          APK_PATH="$OUT_DIR/${EXPORT_NAME}-${GITHUB_RUN_NUMBER}.apk"
          LOG_PATH="$GITHUB_WORKSPACE/godot-android-export.log"

          mkdir -p "$OUT_DIR"

          godot \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-debug "$ANDROID_PRESET" \
            "$APK_PATH" 2>&1 | tee "$LOG_PATH"

          test -f "$APK_PATH"

          ls -lah "$OUT_DIR"

      - name: Build Web
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/web"
          LOG_PATH="$GITHUB_WORKSPACE/godot-web-export.log"

          mkdir -p "$OUT_DIR"

          godot \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-release "$WEB_PRESET" \
            "$OUT_DIR/index.html" 2>&1 | tee "$LOG_PATH"

          test -f "$OUT_DIR/index.html"

          ls -lah "$OUT_DIR"

      - name: Upload Android APK artifact
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-android-apk
          path: build/android/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Web artifact
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-web
          path: build/web
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Godot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-godot-logs
          path: |
            godot-warmup.log
            godot-android-export.log
            godot-web-export.log
          if-no-files-found: warn
          retention-days: 7
