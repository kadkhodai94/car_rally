name: Build Godot Latest ZIP

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android APK"
        required: true
        default: true
        type: boolean
      build_web:
        description: "Build Web ZIP"
        required: true
        default: true
        type: boolean

  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: godot-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3"
  GODOT_STATUS: "stable"

  GAME_NAME: "jade-bipayan"
  ANDROID_PRESET: "Android APK Debug"
  WEB_PRESET: "Web"

jobs:
  build:
    name: Build Godot Latest ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip zip curl python3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail

          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi

          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found."
            echo "ANDROID_HOME=$ANDROID_HOME"
            find "$ANDROID_HOME" -maxdepth 5 -type f -name sdkmanager || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses || true

          "$SDKMANAGER" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "platforms;android-34" \
            "cmdline-tools;latest"

          echo "Installed Android SDK packages:"
          "$SDKMANAGER" --list_installed | head -n 100

      - name: Resolve latest Godot project ZIP
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$GITHUB_WORKSPACE"
          WORK="$ROOT/_godot_ci"
          EXTRACT_DIR="$WORK/extracted"

          rm -rf "$WORK"
          mkdir -p "$EXTRACT_DIR"

          if [ -f "$ROOT/project.godot" ]; then
            echo "project_dir=$ROOT" >> "$GITHUB_OUTPUT"
            echo "source_type=root" >> "$GITHUB_OUTPUT"
            echo "zip_file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ZIP_FILE="$(python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(".").resolve()
          zips = [
              p for p in root.glob("*.zip")
              if p.is_file()
              and not p.name.startswith("_")
              and "artifact" not in p.name.lower()
              and "build" not in p.name.lower()
              and "output" not in p.name.lower()
          ]

          if not zips:
              print("ERROR: No ZIP file found in repository root.", file=sys.stderr)
              sys.exit(1)

          def version_key(path: Path):
              name = path.stem.lower()
              matches = re.findall(r"(?:v)?(\d+(?:[._-]\d+){0,6})", name)
              if matches:
                  last = matches[-1]
                  nums = [int(x) for x in re.split(r"[._-]", last) if x.isdigit()]
              else:
                  nums = []

              nums = nums + [0] * (7 - len(nums))
              return (tuple(nums[:7]), path.stat().st_mtime, path.name.lower())

          print(sorted(zips, key=version_key)[-1])
          PY
          )"

          echo "Selected ZIP: $ZIP_FILE"

          unzip -q -o "$ZIP_FILE" -d "$EXTRACT_DIR"

          PROJECT_GODOT="$(find "$EXTRACT_DIR" -type f -name project.godot | sort | head -n 1 || true)"

          if [ -z "$PROJECT_GODOT" ]; then
            echo "ERROR: project.godot not found inside selected ZIP."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_GODOT")"

          if [ ! -f "$PROJECT_DIR/export_presets.cfg" ]; then
            echo "ERROR: export_presets.cfg not found beside project.godot."
            exit 1
          fi

          echo "Detected project dir: $PROJECT_DIR"

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "source_type=zip" >> "$GITHUB_OUTPUT"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Patch Godot project for Android CI
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          PROJECT_FILE="$PROJECT_DIR/project.godot"
          PRESET_FILE="$PROJECT_DIR/export_presets.cfg"

          echo "Patching Godot project for CI..."
          echo "Project file: $PROJECT_FILE"
          echo "Preset file: $PRESET_FILE"

          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          project_file = Path(os.environ["PROJECT_FILE"])
          preset_file = Path(os.environ["PRESET_FILE"])

          project_text = project_file.read_text(encoding="utf-8")
          preset_text = preset_file.read_text(encoding="utf-8")

          # برای بازی 2D ساده، compatibility renderer کم‌دردسرتر است
          # و خطای min sdk مربوط به mobile renderer را حذف می‌کند.
          if 'renderer/rendering_method=' in project_text:
              project_text = re.sub(
                  r'renderer/rendering_method="[^"]*"',
                  'renderer/rendering_method="gl_compatibility"',
                  project_text
              )
          else:
              if "[rendering]" not in project_text:
                  project_text += "\n[rendering]\n"
              project_text += '\nrenderer/rendering_method="gl_compatibility"\n'

          if 'renderer/rendering_method.mobile=' in project_text:
              project_text = re.sub(
                  r'renderer/rendering_method.mobile="[^"]*"',
                  'renderer/rendering_method.mobile="gl_compatibility"',
                  project_text
              )
          else:
              if "[rendering]" in project_text:
                  project_text += 'renderer/rendering_method.mobile="gl_compatibility"\n'

          # در حالت Gradle Build خاموش، نباید min_sdk/target_sdk override شوند.
          preset_text = re.sub(
              r'gradle_build/use_gradle_build=(true|false)',
              'gradle_build/use_gradle_build=false',
              preset_text
          )

          preset_text = re.sub(
              r'gradle_build/min_sdk="[^"]*"',
              'gradle_build/min_sdk=""',
              preset_text
          )

          preset_text = re.sub(
              r'gradle_build/target_sdk="[^"]*"',
              'gradle_build/target_sdk=""',
              preset_text
          )

          # signing debug با keystore ساخته‌شده در workflow انجام می‌شود.
          preset_text = re.sub(
              r'package/signed=(true|false)',
              'package/signed=true',
              preset_text
          )

          project_file.write_text(project_text, encoding="utf-8")
          preset_file.write_text(preset_text, encoding="utf-8")
          PY

          echo "Patched rendering section:"
          grep -n -A8 '^\[rendering\]' "$PROJECT_FILE" || true

          echo "Patched Android preset relevant lines:"
          grep -nE 'gradle_build/use_gradle_build|gradle_build/min_sdk|gradle_build/target_sdk|package/signed' "$PRESET_FILE" || true
        env:
          PROJECT_FILE: ${{ steps.resolve.outputs.project_dir }}/project.godot
          PRESET_FILE: ${{ steps.resolve.outputs.project_dir }}/export_presets.cfg

      - name: Show export presets
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"

          echo "Available presets:"
          grep -n '^name=' "$PROJECT_DIR/export_presets.cfg" || true

          echo "Android preset check:"
          if ! grep -q "name=\"${ANDROID_PRESET}\"" "$PROJECT_DIR/export_presets.cfg"; then
            echo "ERROR: Android preset '${ANDROID_PRESET}' not found."
            exit 1
          fi

      - name: Create Android debug keystore
        shell: bash
        run: |
          set -euo pipefail

          KEYSTORE_DIR="$GITHUB_WORKSPACE/_godot_keystore"
          KEYSTORE_PATH="$KEYSTORE_DIR/debug.keystore"

          mkdir -p "$KEYSTORE_DIR"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

          echo "Debug keystore created:"
          ls -lah "$KEYSTORE_PATH"

      - name: Download Godot editor and export templates
        shell: bash
        run: |
          set -euo pipefail

          GODOT_DIR="$GITHUB_WORKSPACE/_godot_engine"
          mkdir -p "$GODOT_DIR"
          cd "$GODOT_DIR"

          GODOT_ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          RELEASE_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}"

          echo "Downloading Godot editor..."
          curl -L --retry 5 --retry-delay 5 "$RELEASE_URL/$GODOT_ZIP" -o "$GODOT_ZIP"
          unzip -q -o "$GODOT_ZIP"

          GODOT_BIN="$(find "$GODOT_DIR" -maxdepth 1 -type f -name 'Godot_v*_linux.x86_64' | head -n 1)"

          if [ -z "$GODOT_BIN" ]; then
            echo "ERROR: Godot binary not found."
            exit 1
          fi

          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

          echo "Downloading Godot export templates..."
          curl -L --retry 5 --retry-delay 5 "$RELEASE_URL/$TEMPLATES_TPZ" -o "$TEMPLATES_TPZ"

          mkdir -p "$GODOT_DIR/templates_unpack"
          unzip -q -o "$TEMPLATES_TPZ" -d "$GODOT_DIR/templates_unpack"

          TEMPLATE_TARGET="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          mkdir -p "$TEMPLATE_TARGET"
          cp -R "$GODOT_DIR/templates_unpack/templates/"* "$TEMPLATE_TARGET/"

          echo "Godot version:"
          "$GODOT_BIN" --version

          echo "Installed templates:"
          ls -lah "$TEMPLATE_TARGET"

      - name: Configure Godot editor settings
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.config/godot"

          cat > "$HOME/.config/godot/editor_settings-4.tres" <<SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${GODOT_ANDROID_KEYSTORE_DEBUG_PATH}"
          export/android/debug_keystore_user = "${GODOT_ANDROID_KEYSTORE_DEBUG_USER}"
          export/android/debug_keystore_pass = "${GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD}"
          SETTINGS

          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Warm up Godot project
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"

          "$GODOT_BIN" \
            --headless \
            --path "$PROJECT_DIR" \
            --editor \
            --quit \
            --verbose || true

      - name: Build Android APK
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/android"
          APK_PATH="$OUT_DIR/${GAME_NAME}-${GITHUB_RUN_NUMBER}.apk"

          mkdir -p "$OUT_DIR"

          echo "Building Android APK..."
          echo "Project: $PROJECT_DIR"
          echo "Preset: $ANDROID_PRESET"
          echo "Output: $APK_PATH"

          "$GODOT_BIN" \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-debug "$ANDROID_PRESET" \
            "$APK_PATH"

          echo "Android output:"
          ls -lah "$OUT_DIR"

          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK was not created."
            exit 1
          fi

      - name: Build Web ZIP
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/web"
          ZIP_OUT="$GITHUB_WORKSPACE/build/${GAME_NAME}-web-${GITHUB_RUN_NUMBER}.zip"

          mkdir -p "$OUT_DIR"

          if ! grep -q "name=\"${WEB_PRESET}\"" "$PROJECT_DIR/export_presets.cfg"; then
            echo "Web preset '${WEB_PRESET}' not found. Skipping web build."
            exit 0
          fi

          "$GODOT_BIN" \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-release "$WEB_PRESET" \
            "$OUT_DIR/index.html"

          cd "$GITHUB_WORKSPACE/build"
          zip -qr "$ZIP_OUT" web

          if [ ! -f "$ZIP_OUT" ]; then
            echo "ERROR: Web ZIP was not created."
            exit 1
          fi

      - name: Upload Android APK artifact
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-android-apk
          path: build/android/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Web artifact
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-web
          path: build/*web*.zip
          if-no-files-found: warn
          retention-days: 14
