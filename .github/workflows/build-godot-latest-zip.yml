name: Build Godot Latest ZIP

on:
  workflow_dispatch:
    inputs:
      build_android:
        description: "Build Android APK"
        required: true
        default: true
        type: boolean
      build_web:
        description: "Build Web ZIP"
        required: true
        default: true
        type: boolean

  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: godot-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.3"
  GODOT_STATUS: "stable"
  GAME_NAME: "jade-bipayan"
  ANDROID_PRESET: "Android APK Debug"
  WEB_PRESET: "Web"

jobs:
  build:
    name: Build Godot Latest ZIP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip zip curl python3 rsync

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail

          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"

          if [ ! -f "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi

          if [ -z "$SDKMANAGER" ]; then
            echo "ERROR: sdkmanager not found."
            echo "ANDROID_HOME=$ANDROID_HOME"
            find "$ANDROID_HOME" -maxdepth 6 -type f -name sdkmanager || true
            exit 1
          fi

          yes | "$SDKMANAGER" --licenses || true

          "$SDKMANAGER" \
            "platform-tools" \
            "build-tools;34.0.0" \
            "build-tools;35.0.1" \
            "platforms;android-34" \
            "platforms;android-35" \
            "cmdline-tools;latest" \
            "cmake;3.10.2.4988404" || true

          echo "Installed Android SDK packages:"
          "$SDKMANAGER" --list_installed | head -n 150

          echo "ANDROID_HOME=$ANDROID_HOME"
          ls -lah "$ANDROID_HOME"
          ls -lah "$ANDROID_HOME/platform-tools" || true
          ls -lah "$ANDROID_HOME/build-tools" || true
          ls -lah "$ANDROID_HOME/platforms" || true

      - name: Resolve latest Godot project ZIP
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          ROOT="$GITHUB_WORKSPACE"
          WORK="$ROOT/_godot_ci"
          EXTRACT_DIR="$WORK/extracted"

          rm -rf "$WORK"
          mkdir -p "$EXTRACT_DIR"

          if [ -f "$ROOT/project.godot" ]; then
            echo "project_dir=$ROOT" >> "$GITHUB_OUTPUT"
            echo "source_type=root" >> "$GITHUB_OUTPUT"
            echo "zip_file=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ZIP_FILE="$(python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(".").resolve()
          zips = [
              p for p in root.glob("*.zip")
              if p.is_file()
              and not p.name.startswith("_")
              and "artifact" not in p.name.lower()
              and "build" not in p.name.lower()
              and "output" not in p.name.lower()
          ]

          if not zips:
              print("ERROR: No ZIP file found in repository root.", file=sys.stderr)
              sys.exit(1)

          def version_key(path: Path):
              name = path.stem.lower()
              matches = re.findall(r"(?:v)?(\d+(?:[._-]\d+){0,8})", name)

              if matches:
                  last = matches[-1]
                  nums = [int(x) for x in re.split(r"[._-]", last) if x.isdigit()]
              else:
                  nums = []

              nums = nums + [0] * (9 - len(nums))
              return (tuple(nums[:9]), path.stat().st_mtime, path.name.lower())

          print(sorted(zips, key=version_key)[-1])
          PY
          )"

          echo "Selected ZIP: $ZIP_FILE"

          unzip -q -o "$ZIP_FILE" -d "$EXTRACT_DIR"

          PROJECT_GODOT="$(find "$EXTRACT_DIR" -type f -name project.godot | sort | head -n 1 || true)"

          if [ -z "$PROJECT_GODOT" ]; then
            echo "ERROR: project.godot not found inside selected ZIP."
            exit 1
          fi

          PROJECT_DIR="$(dirname "$PROJECT_GODOT")"

          if [ ! -f "$PROJECT_DIR/export_presets.cfg" ]; then
            echo "ERROR: export_presets.cfg not found beside project.godot."
            exit 1
          fi

          echo "Detected Godot project:"
          echo "$PROJECT_DIR"

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "source_type=zip" >> "$GITHUB_OUTPUT"
          echo "zip_file=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      - name: Download Godot editor and export templates
        shell: bash
        run: |
          set -euo pipefail

          GODOT_DIR="$GITHUB_WORKSPACE/_godot_engine"
          mkdir -p "$GODOT_DIR"
          cd "$GODOT_DIR"

          GODOT_ZIP="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          TEMPLATES_TPZ="Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          RELEASE_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}"

          echo "Downloading Godot editor..."
          curl -L --retry 5 --retry-delay 5 "$RELEASE_URL/$GODOT_ZIP" -o "$GODOT_ZIP"
          unzip -q -o "$GODOT_ZIP"

          GODOT_BIN="$(find "$GODOT_DIR" -maxdepth 1 -type f -name 'Godot_v*_linux.x86_64' | head -n 1)"

          if [ -z "$GODOT_BIN" ]; then
            echo "ERROR: Godot binary not found."
            exit 1
          fi

          chmod +x "$GODOT_BIN"
          echo "GODOT_BIN=$GODOT_BIN" >> "$GITHUB_ENV"

          echo "Downloading Godot export templates..."
          curl -L --retry 5 --retry-delay 5 "$RELEASE_URL/$TEMPLATES_TPZ" -o "$TEMPLATES_TPZ"

          mkdir -p "$GODOT_DIR/templates_unpack"
          unzip -q -o "$TEMPLATES_TPZ" -d "$GODOT_DIR/templates_unpack"

          TEMPLATE_TARGET="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}"
          rm -rf "$TEMPLATE_TARGET"
          mkdir -p "$TEMPLATE_TARGET"
          cp -R "$GODOT_DIR/templates_unpack/templates/"* "$TEMPLATE_TARGET/"

          echo "Godot version:"
          "$GODOT_BIN" --version

          echo "Template target:"
          echo "$TEMPLATE_TARGET"

          echo "Templates:"
          ls -lah "$TEMPLATE_TARGET"

          if [ ! -f "$TEMPLATE_TARGET/android_debug.apk" ]; then
            echo "ERROR: android_debug.apk template not found."
            exit 1
          fi

          if [ ! -f "$TEMPLATE_TARGET/android_release.apk" ]; then
            echo "ERROR: android_release.apk template not found."
            exit 1
          fi

          if [ ! -f "$TEMPLATE_TARGET/android_source.zip" ]; then
            echo "ERROR: android_source.zip template not found."
            exit 1
          fi

          echo "GODOT_TEMPLATE_TARGET=$TEMPLATE_TARGET" >> "$GITHUB_ENV"
          echo "ANDROID_DEBUG_TEMPLATE=$TEMPLATE_TARGET/android_debug.apk" >> "$GITHUB_ENV"
          echo "ANDROID_RELEASE_TEMPLATE=$TEMPLATE_TARGET/android_release.apk" >> "$GITHUB_ENV"
          echo "ANDROID_SOURCE_ZIP=$TEMPLATE_TARGET/android_source.zip" >> "$GITHUB_ENV"

      - name: Create Android debug keystore
        shell: bash
        run: |
          set -euo pipefail

          KEYSTORE_DIR="$GITHUB_WORKSPACE/_godot_keystore"
          KEYSTORE_PATH="$KEYSTORE_DIR/debug.keystore"

          rm -rf "$KEYSTORE_DIR"
          mkdir -p "$KEYSTORE_DIR"

          keytool -genkeypair \
            -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_USER=androiddebugkey" >> "$GITHUB_ENV"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD=android" >> "$GITHUB_ENV"

          echo "Debug keystore:"
          ls -lah "$KEYSTORE_PATH"

      - name: Patch Godot project and install Android build template
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          PROJECT_FILE="$PROJECT_DIR/project.godot"
          PRESET_FILE="$PROJECT_DIR/export_presets.cfg"

          echo "Project file: $PROJECT_FILE"
          echo "Preset file: $PRESET_FILE"

          echo "Installing Android build template into project..."
          rm -rf "$PROJECT_DIR/android"
          mkdir -p "$PROJECT_DIR/android/build"
          unzip -q -o "$ANDROID_SOURCE_ZIP" -d "$PROJECT_DIR/android/build"

          echo "Android build template files:"
          find "$PROJECT_DIR/android/build" -maxdepth 3 -type f | head -n 80

          if [ ! -f "$PROJECT_DIR/android/build/build.gradle" ] && [ ! -f "$PROJECT_DIR/android/build/build.gradle.kts" ]; then
            echo "ERROR: Android build template was not installed correctly."
            echo "android_source.zip content may have a different structure."
            find "$PROJECT_DIR/android" -maxdepth 5 -type f | head -n 150
            exit 1
          fi

          python3 <<'PY'
          from pathlib import Path
          import os
          import re

          project_file = Path(os.environ["PROJECT_FILE"])
          preset_file = Path(os.environ["PRESET_FILE"])
          debug_keystore = os.environ["DEBUG_KEYSTORE"]

          project = project_file.read_text(encoding="utf-8")
          preset = preset_file.read_text(encoding="utf-8")

          def ensure_section(text: str, section: str) -> str:
              header = f"[{section}]"
              if header not in text:
                  text = text.rstrip() + f"\n\n{header}\n"
              return text

          def set_project_key(text: str, section: str, key: str, value: str) -> str:
              text = ensure_section(text, section)
              header = f"[{section}]"
              pattern = rf"({re.escape(header)}\n)(.*?)(?=\n\[|\Z)"
              match = re.search(pattern, text, flags=re.S)

              if not match:
                  return text

              block = match.group(2)

              if re.search(rf"^{re.escape(key)}=", block, flags=re.M):
                  block = re.sub(
                      rf"^{re.escape(key)}=.*$",
                      f"{key}={value}",
                      block,
                      flags=re.M
                  )
              else:
                  block = block.rstrip() + f"\n{key}={value}\n"

              return text[:match.start(2)] + block + text[match.end(2):]

          def set_preset_key(text: str, key: str, value: str) -> str:
              if re.search(rf"^{re.escape(key)}=", text, flags=re.M):
                  return re.sub(
                      rf"^{re.escape(key)}=.*$",
                      f"{key}={value}",
                      text,
                      flags=re.M
                  )

              marker = "[preset.0.options]"
              if marker not in text:
                  raise SystemExit("ERROR: [preset.0.options] not found in export_presets.cfg")

              pos = text.index(marker) + len(marker)
              return text[:pos] + f"\n{key}={value}" + text[pos:]

          # اسم انگلیسی برای جلوگیری از گیرهای Android label در CI
          project = set_project_key(project, "application", 'config/name', '"Jade Bipayan"')
          project = set_project_key(project, "application", 'config/features', 'PackedStringArray("4.3", "Mobile")')

          # برای بازی 2D ساده، compatibility کم‌ریسک‌تر است.
          project = set_project_key(project, "rendering", 'renderer/rendering_method', '"gl_compatibility"')
          project = set_project_key(project, "rendering", 'renderer/rendering_method.mobile', '"gl_compatibility"')
          project = set_project_key(project, "rendering", 'textures/vram_compression/import_etc2_astc', 'false')

          # مسیر جدید: Gradle Build فعال باشد تا min/target sdk معتبر شوند.
          preset = set_preset_key(preset, 'gradle_build/use_gradle_build', 'true')
          preset = set_preset_key(preset, 'gradle_build/gradle_build_directory', '""')
          preset = set_preset_key(preset, 'gradle_build/android_source_template', '""')
          preset = set_preset_key(preset, 'gradle_build/compress_native_libraries', 'false')
          preset = set_preset_key(preset, 'gradle_build/export_format', '0')
          preset = set_preset_key(preset, 'gradle_build/min_sdk', '"24"')
          preset = set_preset_key(preset, 'gradle_build/target_sdk', '"34"')

          # فعلاً فقط arm64 برای خروجی سبک و سازگار با بازارهای اندرویدی
          preset = set_preset_key(preset, 'architectures/armeabi-v7a', 'false')
          preset = set_preset_key(preset, 'architectures/arm64-v8a', 'true')
          preset = set_preset_key(preset, 'architectures/x86', 'false')
          preset = set_preset_key(preset, 'architectures/x86_64', 'false')

          preset = set_preset_key(preset, 'version/code', '1')
          preset = set_preset_key(preset, 'version/name', '"1.0.0"')

          preset = set_preset_key(preset, 'package/unique_name', '"ir.gamino.jadebipayan"')
          preset = set_preset_key(preset, 'package/name', '"Jade Bipayan"')
          preset = set_preset_key(preset, 'package/signed', 'true')
          preset = set_preset_key(preset, 'package/app_category', '2')
          preset = set_preset_key(preset, 'package/retain_data_on_uninstall', 'false')

          preset = set_preset_key(preset, 'keystore/debug', f'"{debug_keystore}"')
          preset = set_preset_key(preset, 'keystore/debug_user', '"androiddebugkey"')
          preset = set_preset_key(preset, 'keystore/debug_password', '"android"')
          preset = set_preset_key(preset, 'keystore/release', '""')
          preset = set_preset_key(preset, 'keystore/release_user', '""')
          preset = set_preset_key(preset, 'keystore/release_password', '""')

          preset = set_preset_key(preset, 'custom_template/debug', '""')
          preset = set_preset_key(preset, 'custom_template/release', '""')

          preset = set_preset_key(preset, 'apk_expansion/enable', 'false')
          preset = set_preset_key(preset, 'user_data_backup/allow', 'false')
          preset = set_preset_key(preset, 'screen/immersive_mode', 'true')

          project_file.write_text(project, encoding="utf-8")
          preset_file.write_text(preset, encoding="utf-8")
          PY

          echo "Patched project rendering:"
          grep -n -A10 '^\[rendering\]' "$PROJECT_FILE" || true

          echo "Patched Android preset key lines:"
          grep -nE 'gradle_build/use_gradle_build|gradle_build/min_sdk|gradle_build/target_sdk|architectures/|package/unique_name|package/name|package/signed|keystore/debug|custom_template/debug' "$PRESET_FILE" || true

          echo "Available presets:"
          grep -n '^name=' "$PRESET_FILE" || true
        env:
          PROJECT_FILE: ${{ steps.resolve.outputs.project_dir }}/project.godot
          PRESET_FILE: ${{ steps.resolve.outputs.project_dir }}/export_presets.cfg
          DEBUG_KEYSTORE: ${{ env.GODOT_ANDROID_KEYSTORE_DEBUG_PATH }}

      - name: Warm up Godot project once
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"

          "$GODOT_BIN" \
            --headless \
            --path "$PROJECT_DIR" \
            --editor \
            --quit \
            --verbose 2>&1 | tee "$GITHUB_WORKSPACE/godot-warmup.log" || true

      - name: Configure Godot editor settings after warm up
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$HOME/.config/godot"

          for SETTINGS_FILE in "$HOME/.config/godot/editor_settings-4.tres" "$HOME/.config/godot/editor_settings-4.3.tres"; do
            cat > "$SETTINGS_FILE" <<SETTINGS
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${GODOT_ANDROID_KEYSTORE_DEBUG_PATH}"
          export/android/debug_keystore_user = "${GODOT_ANDROID_KEYSTORE_DEBUG_USER}"
          export/android/debug_keystore_pass = "${GODOT_ANDROID_KEYSTORE_DEBUG_PASSWORD}"
          SETTINGS

            echo "Written settings: $SETTINGS_FILE"
            cat "$SETTINGS_FILE"
          done

          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "GODOT_ANDROID_KEYSTORE_DEBUG_PATH=$GODOT_ANDROID_KEYSTORE_DEBUG_PATH"

          if [ ! -f "$ANDROID_HOME/platform-tools/adb" ]; then
            echo "ERROR: adb not found in platform-tools."
            exit 1
          fi

          if [ ! -d "$ANDROID_HOME/build-tools" ]; then
            echo "ERROR: build-tools directory not found."
            exit 1
          fi

      - name: Build Android APK
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/android"
          APK_PATH="$OUT_DIR/${GAME_NAME}-${GITHUB_RUN_NUMBER}.apk"
          LOG_PATH="$GITHUB_WORKSPACE/godot-android-export.log"

          mkdir -p "$OUT_DIR"

          echo "Building Android APK with Gradle Build Template..."
          echo "Project: $PROJECT_DIR"
          echo "Preset: $ANDROID_PRESET"
          echo "Output: $APK_PATH"

          "$GODOT_BIN" \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-debug "$ANDROID_PRESET" \
            "$APK_PATH" 2>&1 | tee "$LOG_PATH"

          echo "Android output:"
          ls -lah "$OUT_DIR"

          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: APK was not created."
            exit 1
          fi

      - name: Build Web ZIP
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_DIR="${{ steps.resolve.outputs.project_dir }}"
          OUT_DIR="$GITHUB_WORKSPACE/build/web"
          ZIP_OUT="$GITHUB_WORKSPACE/build/${GAME_NAME}-web-${GITHUB_RUN_NUMBER}.zip"
          LOG_PATH="$GITHUB_WORKSPACE/godot-web-export.log"

          mkdir -p "$OUT_DIR"

          if ! grep -q "name=\"${WEB_PRESET}\"" "$PROJECT_DIR/export_presets.cfg"; then
            echo "Web preset '${WEB_PRESET}' not found. Skipping web build."
            exit 0
          fi

          "$GODOT_BIN" \
            --headless \
            --verbose \
            --path "$PROJECT_DIR" \
            --export-release "$WEB_PRESET" \
            "$OUT_DIR/index.html" 2>&1 | tee "$LOG_PATH"

          cd "$GITHUB_WORKSPACE/build"
          zip -qr "$ZIP_OUT" web

          if [ ! -f "$ZIP_OUT" ]; then
            echo "ERROR: Web ZIP was not created."
            exit 1
          fi

      - name: Upload Android APK artifact
        if: ${{ github.event_name == 'push' || inputs.build_android == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-android-apk
          path: build/android/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Web artifact
        if: ${{ github.event_name == 'push' || inputs.build_web == true }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-web
          path: build/*web*.zip
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Godot logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.GAME_NAME }}-godot-logs
          path: |
            godot-warmup.log
            godot-android-export.log
            godot-web-export.log
          if-no-files-found: warn
          retention-days: 7
